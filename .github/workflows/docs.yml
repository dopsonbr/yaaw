name: Publish Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage documentation site
        run: |
          set -euo pipefail
          rm -rf .pages _site
          mkdir -p .pages
          cp README.md .pages/index.md
          cp CONTRIBUTING.md .pages/contributing.md
          cp -R docs .pages/docs
          cat > .pages/_config.yml <<'YAML'
          title: YAAW
          description: Yet Another Agent Wrapper
          markdown: kramdown
          theme: minima
          YAML

      - name: Build Pages site
        uses: actions/jekyll-build-pages@v1
        with:
          source: .pages
          destination: _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
