name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer segment to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          current="$(tr -d '[:space:]' < VERSION)"
          case "$current" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "VERSION must be MAJOR.MINOR.PATCH, got: $current" >&2; exit 1 ;;
          esac

          IFS=. read -r major minor patch <<EOF_VERSION
          $current
          EOF_VERSION

          case "$BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unknown bump: $BUMP" >&2
              exit 1
              ;;
          esac

          next="$major.$minor.$patch"
          tag="v$next"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists: $tag" >&2
            exit 1
          fi

          printf '%s\n' "$next" > VERSION
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Commit and tag version
        run: |
          set -euo pipefail
          git add VERSION
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "YAAW ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Check
        run: scripts/check.sh

      - name: Package app
        run: scripts/package-release.sh --version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/YAAW-${{ steps.version.outputs.version }}-macos-arm64.zip" \
            --title "YAAW ${{ steps.version.outputs.tag }}" \
            --generate-notes
